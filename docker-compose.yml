services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: medical_licensing
      POSTGRES_USER: medical_app
      POSTGRES_PASSWORD: medical_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medical_app -d medical_licensing"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

