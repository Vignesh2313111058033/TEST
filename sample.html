<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Medical Billing License Check</title>
  <style>
    :root {
      color-scheme: light;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f3f6f8;
      color: #18232b;
    }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      margin: 0;
    }
    main {
      width: min(460px, calc(100% - 40px));
      padding: 32px;
      border-radius: 16px;
      background: white;
      box-shadow: 0 18px 50px rgba(25, 48, 61, .12);
    }
    h1 { margin: 0 0 8px; font-size: 1.55rem; }
    p { color: #5b6972; line-height: 1.5; }
    label { display: block; margin: 20px 0 7px; font-weight: 650; }
    input, button {
      box-sizing: border-box;
      width: 100%;
      min-height: 46px;
      border-radius: 8px;
      font: inherit;
    }
    input {
      border: 1px solid #bdc8ce;
      padding: 10px 12px;
    }
    button {
      margin-top: 22px;
      border: 0;
      background: #176b87;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }
    button:disabled { opacity: .6; cursor: wait; }
    #result {
      display: none;
      margin-top: 20px;
      padding: 13px;
      border-radius: 8px;
      font-weight: 700;
    }
    #result.success { display: block; color: #12612d; background: #e6f6eb; }
    #result.error { display: block; color: #8a2020; background: #fdeaea; }
  </style>
</head>
<body>
  <main>
    <h1>License Validation</h1>
    <p>Enter the license key. The Windows launcher supplies the combined system UUID and BIOS serial automatically.</p>

    <form id="license-form">
      <label for="license-key">License key</label>
      <input id="license-key" name="license_key"
             placeholder="MED-XXXX-XXXX-XXXX" maxlength="18" required>

      <label for="hardware-id">Hardware ID + BIOS ID</label>
      <input id="hardware-id" name="hardware_id"
             placeholder="Enter hardware ID and BIOS ID" maxlength="255" required>

      <button id="submit-button" type="submit">Check license</button>
    </form>

    <div id="result" role="status" aria-live="polite"></div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const hardwareInput = document.getElementById("hardware-id");
    const result = document.getElementById("result");
    const button = document.getElementById("submit-button");
    hardwareInput.value = params.get("hardware_id") || "";

    if (!hardwareInput.value) {
      showResult(
        "Hardware ID was not detected automatically. You can enter it manually.",
        false
      );
    }

    function showResult(message, success) {
      result.textContent = message;
      result.className = success ? "success" : "error";
    }

    document.getElementById("license-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      button.disabled = true;
      button.textContent = "Checking...";
      result.className = "";

      try {
        const response = await fetch("/api/v1/activate/", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({
            license_key: document.getElementById("license-key").value.trim().toUpperCase(),
            hardware_id: hardwareInput.value
              .trim()
              .replace(/[^A-Za-z0-9]/g, "")
              .toUpperCase()
          })
        });
        const data = await response.json();
        const accepted = response.ok && data.status === "SUCCESS";
        showResult(
          accepted ? `SUCCESS: ${data.message}` : `REJECTED: ${data.message || "License was rejected."}`,
          accepted
        );
      } catch (error) {
        showResult("REJECTED: Could not connect to the licensing API.", false);
      } finally {
        button.disabled = false;
        button.textContent = "Check license";
      }
    });
  </script>
</body>
</html>
